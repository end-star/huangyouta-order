<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄油塔点餐系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #fef9f3 0%, #fff5eb 100%);
            min-height: 100vh;
            color: #333;
        }
        
        /* 开场人数选择弹窗 */
        .welcome-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .welcome-modal.hide {
            display: none;
        }
        
        .welcome-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .welcome-box h2 {
            font-size: 1.5em;
            color: #8b5a2b;
            margin-bottom: 10px;
        }
        
        .welcome-box p {
            color: #888;
            margin-bottom: 25px;
        }
        
        .welcome-person-select {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .welcome-person-select .qty-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a574 0%, #c4956a 100%);
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .welcome-person-select .qty-num {
            font-size: 2.5em;
            font-weight: 700;
            color: #d4a574;
            min-width: 80px;
        }
        
        .welcome-box .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1em;
        }
        
        .header {
            background: linear-gradient(135deg, #d4a574 0%, #c4956a 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(212, 165, 116, 0.4);
        }
        
        .header h1 {
            font-size: 1.8em;
            font-weight: 700;
            letter-spacing: 3px;
        }
        
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        .menu-section {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .category-section {
            background: white;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        .category-title {
            font-size: 1.2em;
            color: #8b5a2b;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 2px solid #e8d5c4;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }
        
        .menu-item {
            background: #fff;
            border: 2px solid #f0e6dc;
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .menu-item:hover {
            border-color: #d4a574;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.2);
        }
        
        .menu-item.selected {
            background: linear-gradient(135deg, #fff8f3 0%, #fff5eb 100%);
            border-color: #d4a574;
        }
        
        .menu-item.selected::after {
            content: '✓';
            position: absolute;
            top: 6px;
            right: 6px;
            width: 20px;
            height: 20px;
            background: #d4a574;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }
        
        .item-name {
            font-weight: 500;
            font-size: 0.95em;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        
        .item-price {
            color: #c4956a;
            font-weight: 700;
            font-size: 1.1em;
        }
        
        .item-unit {
            font-size: 0.75em;
            color: #999;
            margin-left: 3px;
        }
        
        .quantity-control {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #eee;
        }
        
        .quantity-control.show {
            display: flex;
        }
        
        .qty-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: #f0e6dc;
            color: #8b5a2b;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qty-btn:hover {
            background: #d4a574;
            color: white;
        }
        
        .qty-num {
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }
        
        /* 悬浮购物车按钮 */
        .floating-cart-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #d4a574 0%, #c4956a 100%);
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(212, 165, 116, 0.5);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1em;
        }
        
        .floating-cart-btn .badge {
            background: white;
            color: #d4a574;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        
        /* 悬浮购物车面板 */
        .floating-cart-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 30px rgba(0,0,0,0.15);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            z-index: 1001;
        }
        
        .floating-cart-panel.open {
            max-height: 70vh;
        }
        
        .cart-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid #eee;
        }
        
        .cart-panel-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #8b5a2b;
        }
        
        .cart-panel-close {
            width: 30px;
            height: 30px;
            border: none;
            background: #f5f0eb;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            color: #8b5a2b;
        }
        
        .cart-panel-content {
            max-height: calc(70vh - 160px);
            overflow-y: auto;
            padding: 15px 20px;
        }
        
        .person-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px 12px;
            background: #faf7f4;
            border-radius: 10px;
            font-size: 0.9em;
        }
        
        .person-selector label {
            font-weight: 500;
            color: #666;
        }
        
        .person-selector .qty-btn {
            width: 26px;
            height: 26px;
            font-size: 14px;
        }
        
        .person-selector .qty-num {
            min-width: 24px;
        }
        
        .person-selector .per-hint {
            margin-left: auto;
            color: #d4a574;
            font-weight: 600;
        }
        
        .cart-panel-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
        }
        
        .cart-panel-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .cart-panel-total {
            font-size: 1.4em;
            font-weight: 700;
            color: #d4a574;
        }
        
        .cart-panel-per {
            color: #888;
            font-size: 0.9em;
        }
        
        .cart-panel-per strong {
            color: #d4a574;
        }
        
        .cart-panel-actions {
            display: flex;
            gap: 10px;
        }
        
        .cart-panel-actions .btn {
            flex: 1;
            padding: 12px;
            font-size: 0.95em;
        }
        
        .btn {
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #d4a574 0%, #c4956a 100%);
            color: white;
        }
        
        .btn-primary:hover {
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.4);
        }
        
        .btn-secondary {
            background: #f5f0eb;
            color: #8b5a2b;
        }
        
        .cart-empty {
            text-align: center;
            padding: 30px;
            color: #aaa;
        }
        
        .cart-empty-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0e6dc;
        }
        
        .cart-item:last-child {
            border-bottom: none;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-name {
            font-weight: 500;
            font-size: 0.95em;
        }
        
        .cart-item-price {
            color: #999;
            font-size: 0.85em;
        }
        
        .cart-item-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .cart-item-total {
            font-weight: 600;
            color: #c4956a;
        }
        
        .cart-qty-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            background: #f5f0eb;
            color: #8b5a2b;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* 订单汇总页面 */
        .order-summary-page {
            display: none;
            max-width: 500px;
            margin: 20px auto;
            padding: 0 15px;
        }
        
        .order-summary-page.show {
            display: block;
        }
        
        .order-summary-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .order-summary-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #e8d5c4;
            margin-bottom: 20px;
        }
        
        .order-summary-header h2 {
            color: #8b5a2b;
            margin-bottom: 5px;
        }
        
        .order-summary-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #faf7f4;
            border-radius: 12px;
        }
        
        .order-info-item {
            text-align: center;
        }
        
        .order-info-label {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 5px;
        }
        
        .order-info-value {
            font-size: 1.3em;
            font-weight: 700;
            color: #d4a574;
        }
        
        .order-list {
            margin-bottom: 20px;
        }
        
        .order-list-title {
            font-weight: 600;
            color: #8b5a2b;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #f0e6dc;
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .order-item-name {
            flex: 1;
        }
        
        .order-item-qty {
            color: #888;
            margin: 0 15px;
        }
        
        .order-item-price {
            font-weight: 600;
            color: #c4956a;
        }
        
        .order-summary-footer {
            padding-top: 20px;
            border-top: 2px solid #e8d5c4;
            text-align: center;
        }
        
        .order-total {
            font-size: 1.5em;
            font-weight: 700;
            color: #d4a574;
            margin-bottom: 15px;
        }
        
        .order-total span {
            font-size: 0.7em;
            color: #888;
            font-weight: 400;
        }
        
        .order-actions {
            display: flex;
            gap: 10px;
        }
        
        .order-actions .btn {
            flex: 1;
            padding: 14px;
        }
        
        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, #d4a574 0%, #c4956a 100%);
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            z-index: 3000;
        }
        
        .notification.show {
            transform: translateX(-50%) translateY(0);
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .menu-item {
                padding: 10px;
            }
            .item-name {
                font-size: 0.85em;
            }
            .item-price {
                font-size: 1em;
            }
            .header h1 {
                font-size: 1.5em;
            }
            .floating-cart-btn,
            .floating-cart-panel,
            .overlay {
                display: block;
            }
            .cart-section {
                display: none;
            }
        }
        
        /* 桌面端购物车 */
        .desktop-cart {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 100;
        }
        
        .desktop-cart .cart-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .desktop-cart .person-selector {
            margin: 10px;
        }
        
        .desktop-cart .cart-list {
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .desktop-cart .cart-panel-footer {
            padding: 15px;
            border-top: 1px solid #eee;
        }
        
        .desktop-cart .cart-panel-actions {
            display: flex;
            gap: 10px;
        }
        
        .desktop-cart .cart-panel-actions .btn {
            flex: 1;
            padding: 10px;
        }
        
        @media (max-width: 900px) {
            .desktop-cart {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 开场人数选择弹窗 -->
    <div class="welcome-modal" id="welcomeModal">
        <div class="welcome-box">
            <h2>🍰 欢迎光临黄油塔</h2>
            <p>请选择就餐人数</p>
            <div class="welcome-person-select">
                <button class="qty-btn" onclick="changeWelcomePerson(-1)">−</button>
                <span class="qty-num" id="welcomePersonCount">2</span>
                <button class="qty-btn" onclick="changeWelcomePerson(1)">+</button>
            </div>
            <button type="button" class="btn btn-primary" id="startOrderBtn" onclick="startOrder()">开始点餐</button>
        </div>
    </div>
    
    <!-- 遮罩层 -->
    <div class="overlay" id="overlay" onclick="closeCartPanel()"></div>
    
    <!-- 悬浮购物车按钮 -->
    <div class="floating-cart-btn" id="floatingCartBtn" onclick="openCartPanel()">
        <span>🛒</span>
        <span>已点</span>
        <span class="badge" id="floatingCartCount">0</span>
    </div>
    
    <!-- 悬浮购物车面板 -->
    <div class="floating-cart-panel" id="floatingCartPanel">
        <div class="cart-panel-header">
            <span class="cart-panel-title">🛒 已点清单</span>
            <button class="cart-panel-close" onclick="closeCartPanel()">✕</button>
        </div>
        <div class="cart-panel-content">
            <div class="person-selector">
                <label>👥</label>
                <button class="qty-btn" onclick="changePerson(-1)">−</button>
                <span class="qty-num" id="personCount">2</span>
                <button class="qty-btn" onclick="changePerson(1)">+</button>
                <span class="per-hint" id="perHint">人均 ¥0</span>
            </div>
            <div id="floatingCartList">
                <div class="cart-empty">
                    <div class="cart-empty-icon">🍽️</div>
                    <p>还没有选择菜品</p>
                </div>
            </div>
        </div>
        <div class="cart-panel-footer">
            <div class="cart-panel-info">
                <div>
                    <span class="cart-panel-total" id="floatingCartTotal">¥0</span>
                    <div class="cart-panel-per">人均 <strong id="floatingPerPerson">¥0</strong></div>
                </div>
                <div class="cart-panel-actions">
                    <button class="btn btn-secondary" onclick="clearCart()">清空</button>
                    <button class="btn btn-primary" onclick="goToSummary()">提交</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 主内容 -->
    <div class="main-content" id="mainContent">
        <div class="header">
            <h1>🍰 黄油塔</h1>
        </div>
        
        <div class="main-container">
            <div class="menu-section" id="menuSection"></div>
        </div>
    </div>
    
    <!-- 桌面端购物车 -->
    <div class="desktop-cart" id="desktopCart">
        <div class="cart-panel-header">
            <span class="cart-panel-title">🛒 已点清单</span>
            <span class="badge" id="desktopCartCount">0</span>
        </div>
        <div class="person-selector">
            <label>👥</label>
            <button class="qty-btn" onclick="changePerson(-1)">−</button>
            <span class="qty-num" id="desktopPersonCount">2</span>
            <button class="qty-btn" onclick="changePerson(1)">+</button>
            <span class="per-hint" id="desktopPerHint">人均 ¥0</span>
        </div>
        <div class="cart-list" id="desktopCartList">
            <div class="cart-empty">
                <div class="cart-empty-icon">🍽️</div>
                <p>还没有选择菜品</p>
            </div>
        </div>
        <div class="cart-panel-footer">
            <div class="cart-panel-info">
                <span class="cart-panel-total" id="desktopCartTotal">¥0</span>
                <div class="cart-panel-per">人均 <strong id="desktopPerPerson">¥0</strong></div>
            </div>
            <div class="cart-panel-actions">
                <button class="btn btn-secondary" onclick="clearCart()">清空</button>
                <button class="btn btn-primary" onclick="goToSummary()">提交</button>
            </div>
        </div>
    </div>
    
    <!-- 订单汇总页面 -->
    <div class="order-summary-page" id="orderSummaryPage">
        <div class="order-summary-card">
            <div class="order-summary-header">
                <h2>📋 订单确认</h2>
                <p style="color: #888; font-size: 0.9em;">黄油塔日韩融合轻食</p>
            </div>
            
            <div class="order-summary-info">
                <div class="order-info-item">
                    <div class="order-info-label">就餐人数</div>
                    <div class="order-info-value" id="summaryPerson">2人</div>
                </div>
                <div class="order-info-item">
                    <div class="order-info-label">已点菜品</div>
                    <div class="order-info-value" id="summaryCount">0</div>
                </div>
                <div class="order-info-item">
                    <div class="order-info-label">人均</div>
                    <div class="order-info-value" id="summaryPer">¥0</div>
                </div>
            </div>
            
            <div class="order-list">
                <div class="order-list-title">🍽️ 已点菜品明细</div>
                <div id="summaryList"></div>
            </div>
            
            <div class="order-summary-footer">
                <div class="order-total">
                    合计 <span id="summaryTotal">¥0</span>
                </div>
                <div class="order-actions">
                    <button class="btn btn-secondary" onclick="backToMenu()">继续点餐</button>
                    <button class="btn btn-primary" onclick="confirmOrder()">确认下单</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>

    <script>
        var menuData = {
            "沙拉": [
                { name: "无花果和风轻蔬沙拉", price: 22, unit: "份" },
                { name: "热带辣芒果鸡肉沙拉", price: 19, unit: "份" }
            ],
            "主食": [
                { name: "招牌焦糖三文鱼波奇饭", price: 48, unit: "份" },
                { name: "和风三文鱼牛油果茶泡饭", price: 31, unit: "份" },
                { name: "泰北打抛猪肉饭", price: 26, unit: "份" },
                { name: "海灵菇飞鱼籽拌饭", price: 27, unit: "份" },
                { name: "爆浆厚芝士茄香猪排饭", price: 39, unit: "份" },
                { name: "泡菜松板肉石锅饭", price: 34, unit: "份" },
                { name: "山野菌香石锅饭", price: 26, unit: "份" },
                { name: "脆皮鸡排日式咖喱饭", price: 34, unit: "份" }
            ],
            "锅物": [
                { name: "韩式魔鬼超辣鸡爪锅", price: 49, unit: "份" },
                { name: "芝心年糕部队锅", price: 39, unit: "份" },
                { name: "韩式芝士泡菜牛肋锅", price: 169, unit: "份" },
                { name: "和风暖物寿喜锅", price: 0, unit: "份" },
                { name: "黄金咖喱奶油焗大虾", price: 68, unit: "份" },
                { name: "爆香首尔香麻鸡", price: 39, unit: "份" },
                { name: "拉丝马苏里拉辣炒鸡", price: 49, unit: "份" }
            ],
            "小吃甜品": [
                { name: "黑糖奶油慕斯可颂塔", price: 26, unit: "份" },
                { name: "提拉米苏奶油可颂塔", price: 26, unit: "份" },
                { name: "开心果外交官可颂塔", price: 28, unit: "份" },
                { name: "韩式蜂巢年糕", price: 19, unit: "份" },
                { name: "金蒜脆皮烤翅", price: 27, unit: "份" },
                { name: "秘酱韩式脆皮炸鸡", price: 26, unit: "份" },
                { name: "首尔爆辣吮指鸡翅", price: 28, unit: "份" },
                { name: "黄油柿饼雪山冰淇淋", price: 26, unit: "份" },
                { name: "韩式海苔三文鱼手卷", price: 34, unit: "份" }
            ],
            "饮品": [
                { name: "日式葡桑果茶", price: 19, unit: "700ML" },
                { name: "中式百果凤梨香", price: 19, unit: "700ML" },
                { name: "泰式青柠乳酸饮", price: 19, unit: "700ML" },
                { name: "马来柠檬红茶", price: 19, unit: "700ML" }
            ]
        };
        
        var categoryIcons = {
            "沙拉": "🥗",
            "主食": "🍚",
            "锅物": "🍲",
            "小吃甜品": "🧁",
            "饮品": "🥤"
        };
        
        var cart = {};
        var personCount = 2;
        
        function initMenu() {
            var menuSection = document.getElementById('menuSection');
            var html = '';
            
            for (var category in menuData) {
                var items = menuData[category];
                html += '<div class="category-section">';
                html += '<h2 class="category-title"><span>' + (categoryIcons[category] || '🍴') + '</span> ' + category + '</h2>';
                html += '<div class="menu-grid">';
                
                for (var i = 0; i < items.length; i++) {
                    var item = items[i];
                    var itemId = category + '-' + i;
                    html += '<div class="menu-item" id="' + itemId + '" onclick="toggleItem(\'' + itemId + '\')">';
                    html += '<div class="item-name">' + item.name + '</div>';
                    html += '<div class="item-price">¥' + item.price + '<span class="item-unit">/' + item.unit + '</span></div>';
                    html += '<div class="quantity-control" id="qty-' + itemId + '">';
                    html += '<button class="qty-btn" onclick="event.stopPropagation(); changeQty(\'' + itemId + '\', -1)">−</button>';
                    html += '<span class="qty-num" id="num-' + itemId + '">1</span>';
                    html += '<button class="qty-btn" onclick="event.stopPropagation(); changeQty(\'' + itemId + '\', 1)">+</button>';
                    html += '</div></div>';
                }
                html += '</div></div>';
            }
            
            menuSection.innerHTML = html;
        }
        
        function changeWelcomePerson(delta) {
            alert('changeWelcomePerson 点击了! delta=' + delta);
            personCount += delta;
            if (personCount < 1) personCount = 1;
            if (personCount > 20) personCount = 20;
            document.getElementById('welcomePersonCount').innerHTML = personCount;
        }
        
        function startOrder() {
            alert('startOrder 点击了! personCount=' + personCount);
            document.getElementById('personCount').innerHTML = personCount;
            document.getElementById('welcomeModal').style.display = 'none';
            updateCart();
        }
        
        function toggleItem(itemId) {
            var parts = itemId.split('-');
            var category = parts[0];
            var idx = parseInt(parts[1]);
            var itemData = menuData[category][idx];
            var itemEl = document.getElementById(itemId);
            
            if (cart[itemId]) {
                delete cart[itemId];
                itemEl.classList.remove('selected');
                document.getElementById('qty-' + itemId).classList.remove('show');
            } else {
                cart[itemId] = { name: itemData.name, price: itemData.price, unit: itemData.unit, qty: 1 };
                itemEl.classList.add('selected');
                document.getElementById('qty-' + itemId).classList.add('show');
                document.getElementById('num-' + itemId).innerHTML = '1';
                showNotification('已添加：' + itemData.name);
            }
            updateCart();
        }
        
        function changeQty(itemId, delta) {
            if (cart[itemId]) {
                cart[itemId].qty += delta;
                if (cart[itemId].qty <= 0) {
                    delete cart[itemId];
                    document.getElementById(itemId).classList.remove('selected');
                    document.getElementById('qty-' + itemId).classList.remove('show');
                } else {
                    document.getElementById('num-' + itemId).innerHTML = cart[itemId].qty;
                }
                updateCart();
            }
        }
        
        function updateCart() {
            var items = [];
            for (var key in cart) items.push([key, cart[key]]);
            
            var totalCount = 0, totalPrice = 0;
            for (var i = 0; i < items.length; i++) totalCount += items[i][1].qty, totalPrice += items[i][1].price * items[i][1].qty;
            var perPerson = personCount > 0 ? Math.round(totalPrice / personCount) : 0;
            
            document.getElementById('floatingCartCount').innerHTML = totalCount;
            document.getElementById('floatingCartTotal').innerHTML = '¥' + totalPrice;
            document.getElementById('floatingPerPerson').innerHTML = '¥' + perPerson;
            document.getElementById('perHint').innerHTML = '人均 ¥' + perPerson;
            document.getElementById('personCount').innerHTML = personCount;
            
            document.getElementById('desktopCartCount').innerHTML = totalCount;
            document.getElementById('desktopCartTotal').innerHTML = '¥' + totalPrice;
            document.getElementById('desktopPerPerson').innerHTML = '¥' + perPerson;
            document.getElementById('desktopPerHint').innerHTML = '人均 ¥' + perPerson;
            document.getElementById('desktopPersonCount').innerHTML = personCount;
            
            var emptyHtml = '<div class="cart-empty"><div class="cart-empty-icon">🍽️</div><p>还没有选择菜品</p></div>';
            var listHtml = '';
            for (var j = 0; j < items.length; j++) {
                var itemId = items[j][0];
                var item = items[j][1];
                listHtml += '<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">' + item.name + '</div><div class="cart-item-price">¥' + item.price + ' × ' + item.qty + '</div></div><div class="cart-item-right"><span class="cart-item-total">¥' + (item.price * item.qty) + '</span><button class="cart-qty-btn" onclick="changeQty(\'' + itemId + '\', -1)">−</button></div></div>';
            }
            
            if (items.length === 0) {
                document.getElementById('floatingCartList').innerHTML = emptyHtml;
                document.getElementById('desktopCartList').innerHTML = emptyHtml;
            } else {
                document.getElementById('floatingCartList').innerHTML = listHtml;
                document.getElementById('desktopCartList').innerHTML = listHtml;
            }
        }
        
        function openCartPanel() {
            if (Object.keys(cart).length === 0) {
                showNotification('请先选择菜品');
                return;
            }
            document.getElementById('floatingCartPanel').classList.add('open');
            document.getElementById('overlay').classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        function closeCartPanel() {
            document.getElementById('floatingCartPanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
            document.body.style.overflow = '';
        }
        
        function changePerson(delta) {
            personCount += delta;
            if (personCount < 1) personCount = 1;
            if (personCount > 20) personCount = 20;
            updateCart();
        }
        
        function clearCart() {
            cart = {};
            var selected = document.querySelectorAll('.menu-item.selected');
            for (var i = 0; i < selected.length; i++) selected[i].classList.remove('selected');
            var qtyControls = document.querySelectorAll('.quantity-control');
            for (var j = 0; j < qtyControls.length; j++) qtyControls[j].classList.remove('show');
            updateCart();
            closeCartPanel();
            showNotification('已清空');
        }
        
        function goToSummary() {
            if (Object.keys(cart).length === 0) {
                showNotification('请先选择菜品');
                return;
            }
            closeCartPanel();
            
            var items = [];
            for (var key in cart) items.push([key, cart[key]]);
            var totalCount = 0, totalPrice = 0;
            for (var i = 0; i < items.length; i++) totalCount += items[i][1].qty, totalPrice += items[i][1].price * items[i][1].qty;
            var perPerson = personCount > 0 ? Math.round(totalPrice / personCount) : 0;
            
            document.getElementById('summaryPerson').innerHTML = personCount + '人';
            document.getElementById('summaryCount').innerHTML = totalCount;
            document.getElementById('summaryPer').innerHTML = '¥' + perPerson;
            document.getElementById('summaryTotal').innerHTML = '¥' + totalPrice;
            
            var listHtml = '';
            for (var j = 0; j < items.length; j++) {
                var item = items[j][1];
                listHtml += '<div class="order-item"><span class="order-item-name">' + item.name + '</span><span class="order-item-qty">× ' + item.qty + '</span><span class="order-item-price">¥' + (item.price * item.qty) + '</span></div>';
            }
            document.getElementById('summaryList').innerHTML = listHtml;
            
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('orderSummaryPage').classList.add('show');
            window.scrollTo(0, 0);
        }
        
        function backToMenu() {
            document.getElementById('orderSummaryPage').classList.remove('show');
            document.getElementById('mainContent').style.display = 'block';
            window.scrollTo(0, 0);
        }
        
        function confirmOrder() {
            var items = [];
            for (var key in cart) items.push([key, cart[key]]);
            var totalCount = 0, totalPrice = 0;
            for (var i = 0; i < items.length; i++) totalCount += items[i][1].qty, totalPrice += items[i][1].price * items[i][1].qty;
            var perPerson = personCount > 0 ? Math.round(totalPrice / personCount) : 0;
            
            var orderList = '';
            for (var j = 0; j < items.length; j++) orderList += items[j][1].name + ' × ' + items[j][1].qty + '\n';
            
            alert('订单已确认\n\n就餐人数：' + personCount + '人\n\n' + orderList + '\n共计 ' + totalCount + ' 件\n合计：¥' + totalPrice + '\n人均：¥' + perPerson + '\n\n感谢您的点餐！');
        }
        
        function showNotification(message) {
            var notification = document.getElementById('notification');
            notification.innerHTML = message;
            notification.classList.add('show');
            setTimeout(function() {
                notification.classList.remove('show');
            }, 1500);
        }
        
        initMenu();
    </script>
</body>
</html>
